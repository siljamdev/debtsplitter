<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="stylesheet" href="style.css">
	<script src="script.js"></script>
	
    <title>Debt splitter</title>
	<link rel="icon" href="res/icon.png" type="image/png">
</head>
<body>
	<div class="orangeDiv" id="participants">
		<h2 class="orangeTitle">Participants</h1>
		
		<div id="participantsGrid" class="orangeScrollable">			
			<button class="orangeButton" id="addParticipant">+</button>
		</div>
	</div>
	
	<div class="orangeDiv" id="expenses">
		<h2 class="orangeTitle">Expenses</h2>
		<div class="orangeScrollable" id="expensesList">			
			<button id="addExpense" class="orangeButton">+</button>
		</div>
	</div>
	
	<div class="orangeDiv" id="balances">
		<h2 class="orangeTitle">Balances</h2>
	</div>
	
	<a href="https://github.com/siljamdev/lambdainterpreter">
		<img style="position: fixed; top: 10px; right: 10px; width: 40px; height: 40px;" src="res/github.png" alt="GitHub repo">
	</a>
	
	<img id="shareButton" style="position: fixed; top: 60px; right: 10px; width: 40px; height: 40px; cursor: pointer;" src="res/share.png" alt="Copy share link">
</body>
</html>
